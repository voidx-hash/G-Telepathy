# G Telepathy — Docker Compose
# Use this to run both frontend + backend on a single VM with Docker.
# For Vercel frontend + GCP VM backend, you don't need this file.
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d --build
#   3. Access: http://localhost (nginx on port 80)
#
# For production, put this behind nginx with SSL (see deploy/nginx.conf)

version: "3.9"

services:
  # ── Backend (FastAPI + Socket.io) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gtelepath-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=production
    ports:
      - "127.0.0.1:8000:8000"   # Only accessible from localhost (nginx proxies it)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_APP_NAME=G Telepathy
    container_name: gtelepath-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # Only accessible from localhost
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
